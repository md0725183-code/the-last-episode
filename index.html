<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LAST EPISODE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:bold;
color:#E50914;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
outline:none;
margin-bottom:20px;
text-align:center;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#E50914;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#b20710;
}

#message{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
NETFLIX
</div>

<div class="subtitle">
THE LAST EPISODE
</div>

<input
type="password"
id="pass"
placeholder="Enter Password">

<button onclick="checkPassword()">
Continue
</button>

<div id="message"></div>

</div>

<script>

function checkPassword(){

let p=document.getElementById("pass").value;

if(p==="01082026"){

document.getElementById("message").innerHTML="❤️ Access Granted ❤️";

}else{

document.getElementById("message").innerHTML="❌ Wrong Password";

}

}

</script>

</body>
</html>
