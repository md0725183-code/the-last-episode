<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LAST EPISODE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:90%;
max-width:400px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:bold;
color:#E50914;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
outline:none;
margin-bottom:20px;
text-align:center;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#E50914;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#b20710;
}

#message{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
  #home{
display:none;
text-align:center;
}

#home h1{
color:#E50914;
font-size:42px;
font-weight:bold;
letter-spacing:2px;
margin-bottom:25px;
}

.ep{
background:#141414;
margin:15px 0;
padding:18px;
border-radius:12px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
border:1px solid #333;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.ep:hover{
background:#E50914;
transform:scale(1.03);
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
NETFLIX
</div>

<div class="subtitle">
THE LAST EPISODE
</div>

<input
type="password"
id="pass"
placeholder="Enter Password">

<button onclick="checkPassword()">
Continue
</button>

<div id="message"></div>
  <div id="home">

<h1>THE LAST EPISODE</h1>
<div class="ep" onclick="episode1()">🌙 Episode 1 - The Beginning</div>

<div class="ep">👑 Episode 2 - My Queen</div>

<div class="ep">📸 Episode 3 - Every Smile</div>

<div class="ep">🎂 Episode 4 - Happy Birthday</div>

<div class="ep">💌 Episode 5 - Our Memories</div>

<div class="ep">💍 Episode 6 - Our Future</div>

<div class="ep">❤️ Episode 7 - The Last Episode</div>

  </div>

</div>

<script>

function episode1(){
  document.querySelector(".container").innerHTML=`
<h1 style="color:#E50914;">🌙 Episode 1 - The Beginning</h1>

<p style="font-size:20px;line-height:1.8;">
Har khoobsurat kahani ki shuruaat Allah ki marzi se hoti hai.
Hamari kahani bhi bilkul aisi hi hai...
</p>

<button onclick="location.reload()">
⬅ Back
</button>
`;
}
function checkPassword(){

let p = document.getElementById("pass").value;

if(p==="01082026"){

document.querySelector(".container").innerHTML=`
<h1 style="color:#E50914;">THE LAST EPISODE</h1>



<div class="ep" onclick="episode1()">🌙 Episode 1 - The Beginning</div>
<div class="ep">👑 Episode 2 - My Queen</div>
<div class="ep">📸 Episode 3 - Every Smile</div>
<div class="ep">🎂 Episode 4 - Happy Birthday</div>
<div class="ep">💌 Episode 5 - Our Memories</div>
<div class="ep">💍 Episode 6 - Our Future</div>
<div class="ep">❤️ Episode 7 - The Last Episode</div>
`;
}else{

document.getElementById("message").innerHTML="❌ Wrong Password";

}

}

</script>

</body>
</html>
