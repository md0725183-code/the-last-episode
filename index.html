<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Episode</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
animation:fade 2s ease;
}

.logo{
font-size:65px;
font-weight:bold;
color:#e50914;
letter-spacing:4px;
}

.subtitle{
font-size:22px;
margin-top:15px;
color:#ddd;
}

.line{
margin-top:10px;
font-size:18px;
color:#aaa;
}

button{
margin-top:40px;
padding:15px 45px;
border:none;
border-radius:40px;
font-size:18px;
background:#e50914;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff1f2d;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
THE LAST EPISODE
</div>

<div class="subtitle">
A Story Written By Love ❤️
</div>

<div class="line">
Loading your surprise...
</div>

<button onclick="alert('Welcome ❤️')">
Start
</button>

</div>

</body>
</html>
